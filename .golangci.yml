run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gosec
    - gocritic
    - gochecknoinits

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - os.File.Close
      - os.Remove
      - fmt.Scanf
      - fmt.Sscanf
      - fmt.Sscan
      - strconv.Atoi
      - strconv.ParseUint
      - strconv.ParseInt
      - json.Marshal
      - json.Unmarshal
      - (*encoding/json.Encoder).Encode
      - (*encoding/json.Decoder).Decode
      - (*list.Element).Value
  gosec:
    excludes:
      - G104
      - G301
      - G302
      - G304
      - G306
      - G112
      - G115
  govet:
    enable-all: true
    disable:
      - shadow
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/maksim/camu

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: pkg/camutest
      linters:
        - errcheck
    - path: cmd/camu/main\.go
      linters:
        - gocritic
    - path: internal/fsutil/atomic\.go
      linters:
        - errcheck
    - path: internal/storage/s3\.go
      linters:
        - errcheck
    - path: internal/log/cache\.go
      linters:
        - errcheck
    - path: internal/log/segment\.go
      linters:
        - errcheck
    - path: internal/log/wal\.go
      linters:
        - errcheck
    - path: internal/replication/epoch_history\.go
      linters:
        - errcheck
    - path: internal/replication/fetcher\.go
      linters:
        - errcheck
    - path: internal/server/handlers_consume\.go
      linters:
        - errcheck
    - path: internal/server/partition_manager\.go
      linters:
        - errcheck
    - path: internal/server/server\.go
      linters:
        - errcheck
    - path: internal/producer
      linters:
        - errcheck
    - text: "cognitive complexity"
      linters:
        - gocognit
    - text: "ifElseChain"
      linters:
        - gocritic
    - text: "fieldalignment"
      linters:
        - govet

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true