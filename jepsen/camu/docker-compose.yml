services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jepsen

  setup-minio:
    image: minio/minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/camu-data &&
             echo 'Bucket ready'"
    networks:
      - jepsen

  control:
    build:
      context: .
      dockerfile: docker/control/Dockerfile
    hostname: control
    volumes:
      - ./store:/jepsen/camu/store
      - shared-ssh:/shared-ssh
    depends_on:
      setup-minio:
        condition: service_completed_successfully
      n1:
        condition: service_started
      n2:
        condition: service_started
      n3:
        condition: service_started
      n4:
        condition: service_started
      n5:
        condition: service_started
    networks:
      - jepsen
    entrypoint: >
      bash -c "
        echo 'Distributing SSH keys to nodes...' &&
        for n in n1 n2 n3 n4 n5; do
          until ssh-keyscan $$n >> /root/.ssh/known_hosts 2>/dev/null; do sleep 1; done
          sshpass -p root ssh-copy-id -o StrictHostKeyChecking=no root@$$n 2>/dev/null || true
        done &&
        cp /root/.ssh/id_rsa.pub /shared-ssh/authorized_keys &&
        echo 'SSH keys distributed. Waiting for nodes to pick up keys...' &&
        sleep 3 &&
        echo 'Running Jepsen test...' &&
        exec lein run test --nodes n1,n2,n3,n4,n5 --ssh-private-key /root/.ssh/id_rsa --time-limit 60 --s3-endpoint http://minio:9000 --camu-binary /jepsen/camu/camu --faults kill
      "

  n1: &node
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    hostname: n1
    privileged: true
    volumes:
      - shared-ssh:/shared-ssh
    entrypoint: >
      bash -c "
        mkdir -p /root/.ssh &&
        (while [ ! -f /shared-ssh/authorized_keys ]; do sleep 1; done; cp /shared-ssh/authorized_keys /root/.ssh/authorized_keys; chmod 600 /root/.ssh/authorized_keys) &
        /usr/sbin/sshd -D
      "
    networks:
      - jepsen

  n2:
    <<: *node
    hostname: n2

  n3:
    <<: *node
    hostname: n3

  n4:
    <<: *node
    hostname: n4

  n5:
    <<: *node
    hostname: n5

volumes:
  shared-ssh:

networks:
  jepsen:
    driver: bridge
