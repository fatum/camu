version: "3.8"

services:
  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    networks:
      - jepsen

  control:
    build: .
    image: jepsen-camu-control
    hostname: control
    volumes:
      - .:/jepsen/camu
    depends_on:
      - minio
      - n1
      - n2
      - n3
      - n4
      - n5
    networks:
      - jepsen

  n1:
    image: debian:bookworm
    hostname: n1
    privileged: true
    command: /usr/sbin/sshd -D
    networks:
      - jepsen

  n2:
    image: debian:bookworm
    hostname: n2
    privileged: true
    command: /usr/sbin/sshd -D
    networks:
      - jepsen

  n3:
    image: debian:bookworm
    hostname: n3
    privileged: true
    command: /usr/sbin/sshd -D
    networks:
      - jepsen

  n4:
    image: debian:bookworm
    hostname: n4
    privileged: true
    command: /usr/sbin/sshd -D
    networks:
      - jepsen

  n5:
    image: debian:bookworm
    hostname: n5
    privileged: true
    command: /usr/sbin/sshd -D
    networks:
      - jepsen

networks:
  jepsen:
    driver: bridge
